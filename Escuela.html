<script>
 
const board=document.getElementById("board")
 
const icons=[
"#img1","#img2","#img3","#img4",
"#img5","#img6","#img7","#img8"
]
 
let cards=[...icons,...icons]
 
let first=null
let second=null
let lock=false
 
let pairs=0
let moves=0
 
function createBoard(){
 
board.innerHTML=""
 
let shuffled=cards.sort(()=>Math.random()-0.5)
 
shuffled.forEach((img,i)=>{
 
let x=(i%4)*1.4-2.1
let y=Math.floor(i/4)*1.4-1
 
let cardWrap=document.createElement("a-entity")
cardWrap.classList.add("clickable")
cardWrap.setAttribute("position",`${x} ${y} 0`)
cardWrap.dataset.icon=img
 
let front=document.createElement("a-box")
front.setAttribute("scale","1.2 1.2 0.1")
front.setAttribute("color","#2c2c2c")
 
let back=document.createElement("a-plane")
back.setAttribute("width","1.2")
back.setAttribute("height","1.2")
back.setAttribute("position","0 0 -0.06")
back.setAttribute("rotation","0 180 0")
back.setAttribute("src",img)
 
cardWrap.appendChild(front)
cardWrap.appendChild(back)
 
cardWrap.addEventListener("click",()=>flip(cardWrap))
 
board.appendChild(cardWrap)
 
})
 
}
 
function flip(card){
 
if(lock||card.dataset.matched||card===first)return
 
card.setAttribute("animation",
"property:rotation;to:0 180 0;dur:400")
 
if(!first){
first=card
return
}
 
second=card
moves++
document.getElementById("moves").innerText=moves
 
check()
 
}
 
function check(){
 
lock=true
 
if(first.dataset.icon===second.dataset.icon){
 
first.dataset.matched=true
second.dataset.matched=true
 
pairs++
document.getElementById("pairs").innerText=pairs
 
if(pairs===8){
document.getElementById("victory").style.display="flex"
playVictorySound()
}
 
resetTurn()
 
}else{
 
setTimeout(()=>{
 
first.setAttribute("animation",
"property:rotation;to:0 0 0;dur:400")
 
second.setAttribute("animation",
"property:rotation;to:0 0 0;dur:400")
 
resetTurn()
 
},1000)
 
}
 
}

function playVictorySound() {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        // Una alegre melodía de victoria ascendente de 6 notas
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 1046.50]; // Do, Mi, Sol, Do+, Mi+, Do++
        const step = 0.12; // Tiempo en segundos entre cada nota
        
        notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            // Usamos una onda sinusoidal pura para un tono claro y armónico
            osc.type = "sine"; 
            osc.frequency.setValueAtTime(freq, ctx.currentTime + (idx * step));
            
            // Volumen inicial y desvanecimiento para evitar chasquidos de bocina
            gainNode.gain.setValueAtTime(0, ctx.currentTime + (idx * step));
            gainNode.gain.linearRampToValueAtTime(0.2, ctx.currentTime + (idx * step) + 0.02);
            
            // La última nota se prolonga más tiempo para el festejo
            const noteDur = (idx === notes.length - 1) ? 1.2 : step * 1.5;
            gainNode.gain.setValueAtTime(0.2, ctx.currentTime + (idx * step) + noteDur - 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (idx * step) + noteDur);
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.start(ctx.currentTime + (idx * step));
            osc.stop(ctx.currentTime + (idx * step) + noteDur);
        });
    } catch(e) {
        console.warn("La reproducción de sonido falló o requiere interacción directa:", e);
    }
}
 
function resetTurn(){
[first,second,lock]=[null,null,false]
}
 
createBoard()
 
</script>
